name: Healthcare Management Portal CI/CD Pipeline
on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      # We don't need a local postgres service because we are testing 
      # connectivity to live AWS RDS instance

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Backend Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install python-dotenv  # Ensures environment loading works 

    - name: Download AWS SSL Certificate
      # This resolves the "global-bundle.pem does not exist" error in CI
      run: curl -s https://truststore.pki.rds.amazonaws.com/global/global-bundle.pem -o backend/global-bundle.pem

    - name: Test Cloud Migrations (CI Safety Check)
      # This maps your GitHub Repository Secrets to the CI Environment
      env:
        DB_NAME: ${{ secrets.DB_NAME }}
        DB_USER: ${{ secrets.DB_USER }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        DB_HOST: ${{ secrets.DB_HOST }}
        DB_PORT: 5432
      run: |
        cd backend
        python manage.py migrate --check # Verifies if migrations are in sync with the cloud

    - name: Build Frontend
      run: |
        cd frontend
        npm install
        npm run build --if-present

    - name: Deploy Sync (Optional)
      # You can add deployment steps here once the build is green
      run: echo "Build and Cloud Handshake Successful!"